name: CI-CD Fintech

on:
  push:
    branches:
      - main

jobs:

  build:

    name: Build e Validacao

    runs-on: ubuntu-latest

    steps:

      - name: Checkout do Codigo
        uses: actions/checkout@v4

      - name: Validar Arquivos
        run: |
          echo "Arquivos encontrados:"
          ls -la

      - name: Verificar index.html
        run: |
          test -f index.html

      - name: Build Docker
        run: |
          docker build -t pagaja .
